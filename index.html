<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Go South Coast Fleet List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Go South Coast Fleet List</h1>
  </header>

  <div class="filters">
    <label for="model-filter">Filter by Vehicle Type:</label>
    <select id="model-filter">
      <option value="">All</option>
    </select>

    <label for="operator-filter">Filter by Operator:</label>
    <select id="operator-filter">
      <option value="">All</option>
    </select>
  </div>

  <div class="table-container">
    <table id="fleet-table">
      <thead>
        <tr>
          <th>Fleet No</th>
          <th>Reg Plate</th>
          <th>Year</th>
          <th>Model</th>
          <th>Operator</th>
          <th>Livery</th>
          <th>Status</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="fleet.js"></script>
</body>
</html>
